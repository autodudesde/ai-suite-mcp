<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Module" />

<f:section name="Content">
    <h1 class="mb-3 fw-semibold">
        <core:icon identifier="tx-aisuite-extension" size="medium" />
        <f:translate key="LLL:EXT:ai_suite_mcp/Resources/Private/Language/locallang_module.xlf:aiSuite.module.mcp.wizard.title" />
    </h1>

    <div class="row">
        <div class="col-12">
            <div id="wizard-steps">
                <div class="d-flex flex-wrap gap-3 align-items-stretch">
                    <!-- Step 1: Enable MCP -->
                    <div class="d-flex" style="flex: 0 0 calc(50% - 0.75rem);">
                        <div class="panel panel-default flex-fill">
                            <div class="panel-heading">
                                <label class="panel-title fw-bold">
                                    <core:icon identifier="actions-bolt" />
                                    <f:translate key="LLL:EXT:ai_suite_mcp/Resources/Private/Language/locallang_module.xlf:aiSuite.module.mcp.wizard.step1.title" />
                                </label>
                            </div>
                            <div class="panel-body">
                                <p><f:translate key="LLL:EXT:ai_suite_mcp/Resources/Private/Language/locallang_module.xlf:aiSuite.module.mcp.wizard.step1.description" /></p>
                                <f:if condition="{mcpEnabled}">
                                    <f:then>
                                        <div class="alert alert-success mb-0"><f:translate key="LLL:EXT:ai_suite_mcp/Resources/Private/Language/locallang_module.xlf:aiSuite.module.mcp.wizard.step1.enabled" /></div>
                                    </f:then>
                                    <f:else>
                                        <div class="alert alert-warning mb-0">
                                            <f:translate key="LLL:EXT:ai_suite_mcp/Resources/Private/Language/locallang_module.xlf:aiSuite.module.mcp.wizard.step1.disabled" />
                                            <a href="/typo3/module/settings/extension-configuration" class="alert-link">
                                                <f:translate key="LLL:EXT:ai_suite_mcp/Resources/Private/Language/locallang_module.xlf:aiSuite.module.mcp.wizard.step1.openSettings" />
                                            </a>
                                        </div>
                                    </f:else>
                                </f:if>
                            </div>
                        </div>
                    </div>

                    <!-- Step 2: User Groups -->
                    <div class="d-flex" style="flex: 0 0 calc(50% - 0.75rem);">
                        <div class="panel panel-default flex-fill">
                            <div class="panel-heading">
                                <label class="panel-title fw-bold">
                                    <core:icon identifier="status-user-group-backend" />
                                    <f:translate key="LLL:EXT:ai_suite_mcp/Resources/Private/Language/locallang_module.xlf:aiSuite.module.mcp.wizard.step2.title" />
                                </label>
                            </div>
                            <div class="panel-body">
                                <p><f:translate key="LLL:EXT:ai_suite_mcp/Resources/Private/Language/locallang_module.xlf:aiSuite.module.mcp.wizard.step2.description" /></p>
                                <p class="text-muted mb-0"><f:translate key="LLL:EXT:ai_suite_mcp/Resources/Private/Language/locallang_module.xlf:aiSuite.module.mcp.wizard.step2.permissionNote" /></p>
                            </div>
                        </div>
                    </div>

                    <!-- Step 3: Test -->
                    <div class="d-flex" style="flex: 0 0 calc(50% - 0.75rem);">
                        <div class="panel panel-default flex-fill">
                            <div class="panel-heading">
                                <label class="panel-title fw-bold">
                                    <core:icon identifier="actions-check-circle" />
                                    <f:translate key="LLL:EXT:ai_suite_mcp/Resources/Private/Language/locallang_module.xlf:aiSuite.module.mcp.wizard.step3.title" />
                                </label>
                            </div>
                            <div class="panel-body">
                                <div id="healthCheck">
                                    <button type="button" id="healthCheckBtn" class="btn btn-primary">
                                        <f:translate key="LLL:EXT:ai_suite_mcp/Resources/Private/Language/locallang_module.xlf:aiSuite.module.mcp.wizard.runHealthCheck" />
                                    </button>
                                    <div id="healthResult" class="mt-2"></div>
                                </div>
                                <f:if condition="{isDdev}">
                                    <div class="alert alert-info mt-2 mb-0">
                                        <f:translate key="LLL:EXT:ai_suite_mcp/Resources/Private/Language/locallang_module.xlf:aiSuite.module.mcp.wizard.ddevDetected" />
                                    </div>
                                </f:if>
                            </div>
                        </div>
                    </div>

                    <!-- Step 4: Connect -->
                    <div class="d-flex" style="flex: 0 0 calc(50% - 0.75rem);">
                        <div class="panel panel-default flex-fill">
                            <div class="panel-heading">
                                <label class="panel-title fw-bold">
                                    <core:icon identifier="actions-link" />
                                    <f:translate key="LLL:EXT:ai_suite_mcp/Resources/Private/Language/locallang_module.xlf:aiSuite.module.mcp.wizard.step4.title" />
                                </label>
                            </div>
                            <div class="panel-body">
                                <p class="mb-0"><f:translate key="LLL:EXT:ai_suite_mcp/Resources/Private/Language/locallang_module.xlf:aiSuite.module.mcp.wizard.step4.description" /></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</f:section>
</html>
